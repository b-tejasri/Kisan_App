<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="KisanAI - Smart Farmer App">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KisanAI">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>KisanAI</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #0D2E18;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0A2E1A, #1B4D30);
    }
    #loading img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #loading p {
      color: #95D5B2;
      font-family: sans-serif;
      font-size: 16px;
      margin-top: 20px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <p>🌾 KisanAI Loading...</p>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      // Remove loading screen when Flutter is ready
      _flutter.loader.load({
        onEntrypointLoaded: async function(engineInitializer) {
          document.getElementById('loading').style.display = 'none';
          let appRunner = await engineInitializer.initializeEngine();
          await appRunner.runApp();
        }
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
